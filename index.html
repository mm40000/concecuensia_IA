<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto y Consecuencias de la IA</title>

<style>
:root {
  --azul: #4b6cb7;
  --oscuro: #1a2a6c;
  --fondo: #f4f6f9;
  --texto: #222;
}

/* MODO OSCURO */
body.dark {
  --fondo: #121212;
  --texto: #f1f1f1;
}

/* GENERAL */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: var(--fondo);
  color: var(--texto);
  transition: 0.3s;
}

/* NAV */
nav {
  width: 220px;
  height: 100vh;
  background: var(--oscuro);
  position: fixed;
  padding-top: 30px;
}

nav a {
  display: block;
  color: white;
  padding: 15px 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  background: var(--azul);
}

/* BOTON DARK MODE */
.toggle {
  margin: 20px;
  padding: 10px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 10px;
}

/* MAIN */
main {
  margin-left: 220px;
  padding: 40px;
}

/* SECCIONES */
.seccion {
  display: flex;
  gap: 40px;
  margin-bottom: 80px;
  align-items: center;
  opacity: 0;
  transform: translateY(50px);
  animation: aparecer 1s forwards;
}

.seccion:nth-child(even) {
  flex-direction: row-reverse;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

img, iframe, video {
  width: 100%;
  border-radius: 10px;
}

/* BOTON BONITO */
.btn {
  display: inline-block;
  padding: 12px 20px;
  background: var(--azul);
  color: white;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: var(--oscuro);
}

/* RESPONSIVE */
@media(max-width: 800px){
  nav {
    position: relative;
    width: 100%;
    height: auto;
  }

  main {
    margin-left: 0;
  }

  .seccion {
    flex-direction: column !important;
  }
}
</style>
</head>

<body>

<nav>
  <button class="toggle" onclick="modoOscuro()">🌙 Modo</button>
  <a href="#uno">Desinformación</a>
  <a href="#dos">Privacidad</a>
  <a href="#tres">Impacto</a>
</nav>

<main>

<h1>Impacto de la IA</h1>

<section id="uno" class="seccion">
  <div>
    <h2>Desinformación</h2>
    <p>Los deepfakes pueden manipular la realidad.</p>
    <a href="#" class="btn">Leer más</a>
  </div>
  <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
</section>

<section id="dos" class="seccion">
  <div>
    <h2>Privacidad</h2>
    <p>Los datos personales están en riesgo.</p>
  </div>
  <iframe src="https://www.youtube.com/embed/imlqI6bjlp8"></iframe>
</section>

<section id="tres" class="seccion">
  <div>
    <h2>Impacto laboral</h2>
    <p>La IA puede reemplazar empleos.</p>
  </div>
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-working-on-ai-technology-5170/1080p.mp4">
  </video>
</section>

</main>

<script>
function modoOscuro(){
  document.body.classList.toggle("dark");
}
</script>

</body>
                                      </html>
